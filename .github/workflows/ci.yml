name: CI Pipeline

on:
    push:
        branches:
            - main

jobs:
    test-and-build:
        runs-on: ubuntu-latest

        steps:
            - name: Checkout Repository
              uses: actions/checkout@v4

            - name: Login in to Docker Hub
              uses: docker/login-action@v3
              with:
                username: ${{ secrets.DOCKERHUB_USERNAME }}
                password: ${{ secrets.DOCKERHUB_PASSWORD }}

            - name: Set up Python
              uses: actions/setup-python@v5
              with:
                python-version: '3.9'

            - name: Install Dependencies
              run: |
                pip install -r requirements.txt

            - name: Check Python Syntax
              run: |
                python -m py_compile Diabetes-Prediction-System.py

            - name: Build Docker Image
              run: |
                docker build -t ${secrets.DOCKERHUB_USERNAME}/diabetes-prediction-system:latest .
            
            - name: Push Docker Image
              run: docker push ${{secrets.DOCKERHUB_USERNAME}}/diabetes-prediction-system:latest
                

